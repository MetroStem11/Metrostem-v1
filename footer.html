<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Bomb Footer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --red: #e30613;
            --white: #ffffff;
            --black: #000000;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--red);
        }

        /* FULL RED SECTION */
        .sticker-section {
            background: var(--red);
            padding: 120px 0;
            display: flex;
            justify-content: center;
        }

        /* WHITE STRIP */
        .sticker-footer {
            background: var(--white);
            width: 100%;
            max-width: 1300px;
            /* padding: 70px 40px; */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        /* FLEX ROW */
        .footer-inner {
            display: flex;
            align-items: center;
            gap: 35px;
            border:2px solid black;
            width:100%;
            position:relative;
        }

        /* BASE STICKER */
        .sticker {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            filter: drop-shadow(3px 5px 6px rgba(0, 0, 0, 0.15));
        }

        /* MICRO CLICK EFFECT */
        .sticker:active {
            transform: scale(0.9) rotate(0deg) !important;
        }

        .sticker:hover {
            transform: scale(1.1) rotate(0deg) !important;
        }

        /* LOGO CIRCLE */
        .logo-stamp {
            width: 3vw;
            height: 3vw;
            position:relative;
            left:6%;
        }

        .logo-stamp img {
            height: 15vw;
        }

        /* LINKEDIN */
        .linkedin-sticker {
            height: 1%;
            transform: rotate(12deg) translateY(20px);
            position:relative;
            left:8%;
            bottom:10px;
        }

        .linkedin-sticker img {
            height: 11vw;
            transform: rotate(12deg) translateY(20px);
        }

        /* EMAIL */
        .email-pill {
            background: var(--black);
            color: white;
            padding: 14px 28px;
            border-radius: 18px;
            font-size: 14px;
            position:relative;
            bottom:12px;
            margin-top:8%;
            left:4%;
        }

        /* POINTER */
        .pointer-sticker {
            color: white;
            font-family: Impact, sans-serif;
            font-size: 46px;
            padding: 18px 35px;
            transform: rotate(-1deg) translateY(60px);
            position: relative;
            right:10%;
            top:-90px;
        }

        .pointer-sticker img {
            height: 20vw;
        }

        /* .pointer-sticker::after {
            content: "";
            position: absolute;
            right: -45px;
            top: 50%;
            transform: translateY(-50%);
            border-top: 30px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 45px solid var(--black);
        } */

        /* TICKET */
        .ticket-sticker {
            /* background: var(--black); */
            color: white;
            padding: 12px 22px;
            font-size: 12px;
            text-align: center;
            transform: rotate(-10deg) translateY(-20px);
            position: relative;
            right:18%;
            top:30px;
        }

        .ticket-sticker img {
            /* background: var(--black); */
            height: 10vw;
        }

        /* INSTAGRAM */
        .insta-sticker {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 38px;
            color: var(--black);
            transform: rotate(-5deg);
            position:relative;
            right:20%;
            top:15px;
        }

        .insta-sticker img {
            height: 14vw;
        }

        /* VERTICAL LEGAL */
        .legal-sticker {
            background: var(--black);
            color: white;
            padding: 16px 10px;
            border-radius: 14px;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 11px;
            transform: rotate(5deg) translateY(-10px);
            position:relative;
            right:19%;
        }

        /* WHATSAPP */
        .wa-sticker {
            color: white;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            font-size: 42px;
            transform: rotate(-12deg) translateY(10px);
            position:relative;
            right:19%;
        }

        .wa-sticker img {
            height: 10vw;
        }

        /* CHAT */
        .chat-sticker {
            color: white;
            height: 2vw;
            font-size: 30px;
            transform: rotate(8deg);
            position:relative;
            right:20%;
            bottom:-25px;
        }
        .chat-sticker img{
            height:4vw;
        }
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .footer-inner {
                flex-wrap: wrap;
                justify-content: center;
            }

            .sticker {
                transform: none !important;
            }
        }
    </style>
</head>

<body>

    <section class="sticker-section">
        <footer class="sticker-footer">
            <div class="footer-inner">

                <div class="sticker logo-stamp">
                    <img src="tire logo.png" alt="tirefesse">
                    
                </div>

                <a href="#" class="sticker linkedin-sticker">
                    <img src="linkedin logo.png" alt="linkedin icon">
                </a>

                <div class="sticker email-pill">
                    bonjour@ateliercestparla.com
                </div>

                <div class="sticker pointer-sticker">
                    <img src="hand logo.PNG" alt="hand">
                </div>

                <div class="sticker ticket-sticker">
                    <img src="dinutte logo.png" alt="dinutte">
                </div>

                <a href="#" class="sticker insta-sticker">
                    <img src="instagram logo.png" alt="instagram">
                </a>

                <a href="#" class="sticker legal-sticker">
                    Mentions Légales
                </a>

                <a href="#" class="sticker wa-sticker">
                    <img src="whatsapp logo.png" alt="whatsapp">
                </a>

                <div class="sticker chat-sticker">
                    <img src="chat logo.png" alt="chat">
                </div>

            </div>
        </footer>
    </section>

</body>

</html>
